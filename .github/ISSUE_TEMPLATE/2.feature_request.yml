name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and found no duplicate
          required: true
        - label: I am using the latest version of the kit
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agents
        - Skills
        - Hooks
        - Protocols
        - CLI / Install
        - Documentation
        - Other
    validations:
      required: true
