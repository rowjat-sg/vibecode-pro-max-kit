name: Bug Report
description: Report a bug in the vibecode-pro-max-kit harness
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting! Please fill out the details below."
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and found no duplicate
          required: true
        - label: I am using the latest version of the kit
          required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Install the kit via install.sh
        2. Run vc-setup
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction Link
      description: "Link to a minimal reproduction (GitHub repo, gist, or steps)"
      placeholder: "https://github.com/..."
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Claude Code
        - Codex CLI
        - Both
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kit Version
      description: "Check vc-manifest.json for version"
      placeholder: "2.0.4"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
